<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminbuchung — Bento</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          borderRadius: {
            '4xl': '2rem',
            '5xl': '2.5rem',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
    body { font-family: 'Nunito', sans-serif; }
    .bento-cell { transition: all 0.3s cubic-bezier(.4,0,.2,1); }
    .bento-cell:hover { transform: translateY(-4px) scale(1.04); }
    .pill-slot { transition: all 0.25s ease; }
    .pill-slot:hover { transform: scale(1.06); }
    .pill-slot.selected { transform: scale(1.08); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
    .today-gradient { background: linear-gradient(135deg, #f472b6, #a78bfa, #60a5fa); }
    .float-card { animation: floatIn 0.5s ease-out; }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-white min-h-screen">

  <!-- Header -->
  <header class="px-6 pt-8 pb-4 max-w-6xl mx-auto">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-4xl font-extrabold bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 bg-clip-text text-transparent">
          🗓️ Terminbuchung
        </h1>
        <p class="text-gray-400 mt-1 text-lg">Wähle deinen Wunschtermin — ganz einfach!</p>
      </div>
      <div class="bg-gradient-to-r from-amber-200 to-orange-200 rounded-3xl px-6 py-3 font-bold text-amber-800">
        Mai 2026
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 pb-16">

    <!-- Bento Calendar Grid -->
    <section class="mb-12">
      <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
        📅 Wähle ein Datum
      </h2>
      <div class="grid grid-cols-5 sm:grid-cols-7 gap-4" id="calendar-grid">

        <!-- Weekday headers as bento cards -->
        <div class="bg-pink-100 text-pink-700 font-bold text-center rounded-3xl py-3 text-sm">Mo</div>
        <div class="bg-purple-100 text-purple-700 font-bold text-center rounded-3xl py-3 text-sm">Di</div>
        <div class="bg-blue-100 text-blue-700 font-bold text-center rounded-3xl py-3 text-sm">Mi</div>
        <div class="bg-green-100 text-green-700 font-bold text-center rounded-3xl py-3 text-sm">Do</div>
        <div class="bg-amber-100 text-amber-700 font-bold text-center rounded-3xl py-3 text-sm">Fr</div>
        <div class="bg-rose-100 text-rose-700 font-bold text-center rounded-3xl py-3 text-sm">Sa</div>
        <div class="bg-teal-100 text-teal-700 font-bold text-center rounded-3xl py-3 text-sm hidden sm:block">So</div>

        <!-- Empty cells for offset -->
        <div class="bg-gray-50 rounded-3xl aspect-square opacity-30"></div>
        <div class="bg-gray-50 rounded-3xl aspect-square opacity-30"></div>
        <div class="bg-gray-50 rounded-3xl aspect-square opacity-30"></div>
        <div class="bg-gray-50 rounded-3xl aspect-square opacity-30"></div>

        <!-- Date cells -->
        <div class="bento-cell bg-violet-100 hover:bg-violet-200 rounded-3xl aspect-square flex flex-col items-center justify-center cursor-pointer" onclick="selectDate(this)">
          <span class="text-3xl font-extrabold text-violet-700">1</span>
          <span class="text-xs text-violet-400 mt-1">Fr</span>
        </div>

        <div class="bento-cell bg-sky-100 hover:bg-sky-200 rounded-3xl aspect-square flex flex-col items-center justify-center cursor-pointer" onclick="selectDate(this)">
          <span class="text-3xl font-extrabold text-sky-700">2</span>
          <span class="text-xs text-sky-400 mt-1">Sa</span>
        </div>

        <div class="bento-cell bg-rose-100 hover:bg-rose-200 rounded-3xl aspect-square flex flex-col items-center justify-center cursor-pointer" onclick="selectDate(this)">
          <span class="text-3xl font-extrabold text-rose-700">3</span>
          <span class="text-xs text-rose-400 mt-1">So</span>
        </div>

        <div class="bento-cell bg-emerald-100 hover:bg-emerald-200 rounded-3xl aspect-square flex flex-col items-center justify-center cursor-pointer" onclick="selectDate(this)">
          <span class="text-3xl font-extrabold text-emerald-700">4</span>
          <span class="text-xs text-emerald-400 mt-1">Mo</span>
        </div>

        <div class="bento-cell bg-amber-100 hover:bg-amber-200 rounded-3xl aspect-square flex flex-col items-center justify-center cursor-pointer" onclick="selectDate(this)">
          <span class="text-3xl font-extrabold text-amber-700">5</span>
          <span class="text-xs text-amber-400 mt-1">Di</span>
        </div>

        <div class="bento-cell bg-pink-100 hover:bg-pink-200 rounded-3xl aspect-square flex flex-col items-center justify-center cursor-pointer" onclick="selectDate(this)">
          <span class="text-3xl font-extrabold text-pink-700">6</span>
          <span class="text-xs text-pink-400 mt-1">Mi</span>
        </div>

        <div class="bento-cell bg-cyan-100 hover:bg-cyan-200 rounded-3xl aspect-square flex flex-col items-center justify-center cursor-pointer" onclick="selectDate(this)">
          <span class="text-3xl font-extrabold text-cyan-700">7</span>
          <span class="text-xs text-cyan-400 mt-1">Do</span>
        </div>

        <div class="bento-cell bg-lime-100 hover:bg-lime-200 rounded-3xl aspect-square flex flex-col items-center justify-center cursor-pointer" onclick="selectDate(this)">
          <span class="text-3xl font-extrabold text-lime-700">8</span>
          <span class="text-xs text-lime-400 mt-1">Fr</span>
        </div>

        <!-- TODAY - 29th May -->
        <div class="bento-cell today-gradient rounded-3xl aspect-square flex flex-col items-center justify-center cursor-pointer shadow-lg shadow-purple-200 ring-4 ring-white date-selected" onclick="selectDate(this)">
          <span class="text-sm font-bold text-white/80">HEUTE</span>
          <span class="text-4xl font-extrabold text-white">29</span>
          <span class="text-xs text-white/80">Fr</span>
        </div>

        <div class="bento-cell bg-orange-100 hover:bg-orange-200 rounded-3xl aspect-square flex flex-col items-center justify-center cursor-pointer" onclick="selectDate(this)">
          <span class="text-3xl font-extrabold text-orange-700">30</span>
          <span class="text-xs text-orange-400 mt-1">Sa</span>
        </div>

        <div class="bento-cell bg-fuchsia-100 hover:bg-fuchsia-200 rounded-3xl aspect-square flex flex-col items-center justify-center cursor-pointer" onclick="selectDate(this)">
          <span class="text-3xl font-extrabold text-fuchsia-700">31</span>
          <span class="text-xs text-fuchsia-400 mt-1">So</span>
        </div>

      </div>
    </section>

    <!-- Time Slots as Colorful Pills Grid -->
    <section class="mb-12">
      <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
        ⏰ Verfügbare Zeiten
      </h2>
      <div class="flex flex-wrap gap-4" id="time-slots">

        <button class="pill-slot bg-pink-100 hover:bg-pink-300 text-pink-800 font-bold px-8 py-5 rounded-full text-lg border-4 border-pink-200" onclick="selectSlot(this)">
          08:00 Uhr 🌅
        </button>

        <button class="pill-slot bg-purple-100 hover:bg-purple-300 text-purple-800 font-bold px-8 py-5 rounded-full text-lg border-4 border-purple-200" onclick="selectSlot(this)">
          09:00 Uhr ☕
        </button>

        <button class="pill-slot bg-blue-100 hover:bg-blue-300 text-blue-800 font-bold px-8 py-5 rounded-full text-lg border-4 border-blue-200" onclick="selectSlot(this)">
          10:00 Uhr 💼
        </button>

        <button class="pill-slot bg-emerald-100 hover:bg-emerald-300 text-emerald-800 font-bold px-8 py-5 rounded-full text-lg border-4 border-emerald-200 selected bg-emerald-300 border-emerald-400" onclick="selectSlot(this)">
          11:00 Uhr ✨
        </button>

        <button class="pill-slot bg-amber-100 hover:bg-amber-300 text-amber-800 font-bold px-8 py-5 rounded-full text-lg border-4 border-amber-200" onclick="selectSlot(this)">
          13:00 Uhr 🌤️
        </button>

        <button class="pill-slot bg-rose-100 hover:bg-rose-300 text-rose-800 font-bold px-8 py-5 rounded-full text-lg border-4 border-rose-200" onclick="selectSlot(this)">
          14:00 Uhr 🌸
        </button>

        <button class="pill-slot bg-teal-100 hover:bg-teal-300 text-teal-800 font-bold px-8 py-5 rounded-full text-lg border-4 border-teal-200" onclick="selectSlot(this)">
          15:00 Uhr 🍃
        </button>

        <button class="pill-slot bg-indigo-100 hover:bg-indigo-300 text-indigo-800 font-bold px-8 py-5 rounded-full text-lg border-4 border-indigo-200" onclick="selectSlot(this)">
          16:00 Uhr 🎨
        </button>

        <button class="pill-slot bg-orange-100 hover:bg-orange-300 text-orange-800 font-bold px-8 py-5 rounded-full text-lg border-4 border-orange-200 opacity-50 cursor-not-allowed" disabled>
          17:00 Uhr — Belegt
        </button>

      </div>
    </section>

    <!-- Booking Form -->
    <section class="float-card">
      <div class="bg-gradient-to-br from-pink-50 via-purple-50 to-blue-50 rounded-[2rem] p-10 shadow-xl shadow-purple-100/50 border border-purple-100">

        <h2 class="text-3xl font-extrabold bg-gradient-to-r from-pink-500 to-purple-600 bg-clip-text text-transparent mb-8 flex items-center gap-3">
          🎯 Buchung bestätigen
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <!-- Name -->
          <div class="bg-white rounded-3xl p-6 shadow-sm">
            <label class="text-lg font-bold text-purple-600 flex items-center gap-2 mb-3">
              👤 Dein Name
            </label>
            <input type="text" placeholder="Max Mustermann" class="w-full bg-purple-50 rounded-2xl px-6 py-4 text-lg text-purple-800 placeholder-purple-300 border-2 border-transparent focus:border-purple-300 focus:outline-none transition">
          </div>

          <!-- Email -->
          <div class="bg-white rounded-3xl p-6 shadow-sm">
            <label class="text-lg font-bold text-pink-600 flex items-center gap-2 mb-3">
              📧 E-Mail
            </label>
            <input type="email" placeholder="max@beispiel.de" class="w-full bg-pink-50 rounded-2xl px-6 py-4 text-lg text-pink-800 placeholder-pink-300 border-2 border-transparent focus:border-pink-300 focus:outline-none transition">
          </div>

          <!-- Phone -->
          <div class="bg-white rounded-3xl p-6 shadow-sm">
            <label class="text-lg font-bold text-blue-600 flex items-center gap-2 mb-3">
              📱 Telefon
            </label>
            <input type="tel" placeholder="+49 170 1234567" class="w-full bg-blue-50 rounded-2xl px-6 py-4 text-lg text-blue-800 placeholder-blue-300 border-2 border-transparent focus:border-blue-300 focus:outline-none transition">
          </div>

          <!-- Service -->
          <div class="bg-white rounded-3xl p-6 shadow-sm">
            <label class="text-lg font-bold text-emerald-600 flex items-center gap-2 mb-3">
              🛎️ Leistung
            </label>
            <select class="w-full bg-emerald-50 rounded-2xl px-6 py-4 text-lg text-emerald-800 border-2 border-transparent focus:border-emerald-300 focus:outline-none transition appearance-none">
              <option>Erstberatung</option>
              <option>Folgetermin</option>
              <option>Behandlung</option>
              <option>Telefonat</option>
            </select>
          </div>

        </div>

        <!-- Notes -->
        <div class="bg-white rounded-3xl p-6 shadow-sm mt-6">
          <label class="text-lg font-bold text-amber-600 flex items-center gap-2 mb-3">
            📝 Anmerkungen
          </label>
          <textarea rows="3" placeholder="Gibt es etwas, das wir vorher wissen sollten?" class="w-full bg-amber-50 rounded-2xl px-6 py-4 text-lg text-amber-800 placeholder-amber-300 border-2 border-transparent focus:border-amber-300 focus:outline-none transition resize-none"></textarea>
        </div>

        <!-- Submit -->
        <div class="mt-8 text-center">
          <button class="bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 text-white font-extrabold text-xl px-12 py-5 rounded-full shadow-lg shadow-purple-300 hover:shadow-xl hover:shadow-purple-400 hover:scale-105 transition-all duration-300">
            ✅ Termin verbindlich buchen
          </button>
          <p class="text-gray-400 mt-4 text-sm">Du erhältst eine Bestätigung per E-Mail</p>
        </div>

      </div>
    </section>

  </main>

  <script>
    function selectDate(el) {
      document.querySelectorAll('#calendar-grid .bento-cell').forEach(c => {
        c.classList.remove('ring-4', 'ring-purple-400', 'shadow-lg', 'shadow-purple-200');
      });
      el.classList.add('ring-4', 'ring-purple-400', 'shadow-lg', 'shadow-purple-200');
    }

    function selectSlot(el) {
      document.querySelectorAll('.pill-slot').forEach(s => {
        s.classList.remove('selected');
        // Reset to original lighter shade
      });
      el.classList.add('selected');
    }
  </script>

</body>
</html>
