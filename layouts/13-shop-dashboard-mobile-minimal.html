<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shop Dashboard — Mobile — ◻️ Minimal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #f4f5f7; --text: #1a1a2e; --text-secondary: #6b7280; }
    * { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); margin: 0; max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    
    .status-bar { padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; background: white; }
    
    .top-bar { background: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .top-bar-title { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 20px; flex: 1; }
    
    .card { border-radius: 20px; padding: 20px; color: white; position: relative; overflow: hidden; min-height: 150px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; transition: transform 0.15s; }
    .card:hover { transform: scale(1.02); }
    .card::after { content: ''; position: absolute; top: -30px; right: -30px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; }
    
    .card-teal { background: linear-gradient(135deg, #0d9488, #14b8a6); }
    .card-purple { background: linear-gradient(135deg, #7c3aed, #8b5cf6); }
    .card-yellow { background: linear-gradient(135deg, #d97706, #f59e0b); }
    .card-pink { background: linear-gradient(135deg, #db2777, #ec4899); }
    .card-blue { background: linear-gradient(135deg, #2563eb, #3b82f6); }
    .card-orange { background: linear-gradient(135deg, #ea580c, #f97316); }
    
    .card-top { display: flex; justify-content: space-between; align-items: start; }
    .card-icon { font-size: 20px; opacity: 0.9; }
    .card-arrow { font-size: 14px; opacity: 0.7; }
    .card-title { font-size: 14px; font-weight: 600; margin-top: 8px; }
    .card-bottom { margin-top: auto; }
    .card-number { font-size: 28px; font-weight: 800; line-height: 1; }
    .card-subtitle { font-size: 12px; opacity: 0.8; margin-top: 4px; }
    
    .bottom-nav { background: white; border-top: 1px solid #e5e7eb; display: flex; justify-content: space-around; padding: 10px 0 24px; position: sticky; bottom: 0; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; color: #9ca3af; cursor: pointer; padding: 4px 12px; }
    .nav-item.active { color: #0d9488; }
    .nav-icon { font-size: 22px; }
  
    body { background: #fafafa !important; }
    * { border-radius: 4px !important; }
    .card, .recipe-card, .subject-card, .control-card, .restaurant-card,
    .doctor-card, .appointment-card, .message-preview, .place-card {
        background: white !important; border: 1px solid #e5e5e5 !important;
        box-shadow: none !important; padding: 20px !important;
    }
    .nav, nav { background: white !important; border-bottom: 1px solid #e5e5e5 !important; box-shadow: none !important; }
    h1 { font-weight: 300 !important; letter-spacing: -0.03em !important; }
    h2, h3 { font-weight: 400 !important; }
    .btn-primary, .btn-book { background: #1a1a1a !important; border-radius: 4px !important; }
    .filter-chip, .category-chip { border-radius: 4px !important; border: 1px solid #e5e5e5 !important; background: transparent !important; }
    .filter-chip.active, .category-chip.active { background: #1a1a1a !important; color: white !important; border-color: #1a1a1a !important; }
    .tag, .badge { border-radius: 4px !important; }
    .bottom-nav { background: white !important; border-top: 1px solid #e5e5e5 !important; }
    .search-bar, .compose { background: white !important; border: 1px solid #e5e5e5 !important; }
    
</style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:41</span>
    <div style="display: flex; gap: 4px; align-items: center;">
      <span style="font-size: 11px;">5G</span>
      <span>📶</span>
      <span>🔋</span>
    </div>
  </div>

  <!-- Top Bar -->
  <div class="top-bar">
    <div style="cursor: pointer; font-size: 20px;">☰</div>
    <div class="top-bar-title">Oppaly</div>
    <div style="display: flex; gap: 16px;">
      <span style="cursor: pointer; font-size: 20px;">🔍</span>
      <span style="cursor: pointer; font-size: 20px; position: relative;">🔔<span style="position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:#ef4444;border-radius:50%;border:2px solid white;"></span></span>
    </div>
  </div>

  <!-- Card Grid -->
  <div class="grid">
    <div class="card card-teal">
      <div class="card-top">
        <span class="card-icon">🏪</span>
        <span class="card-arrow">→</span>
      </div>
      <div>
        <div class="card-title">Shop erstellen</div>
        <div class="card-bottom">
          <div class="card-number">01</div>
          <div class="card-subtitle">Deine Shops</div>
        </div>
      </div>
    </div>

    <div class="card card-purple">
      <div class="card-top">
        <span class="card-icon">🎨</span>
        <span class="card-arrow">→</span>
      </div>
      <div>
        <div class="card-title">Shop Themes</div>
        <div class="card-bottom">
          <div class="card-number">33</div>
          <div class="card-subtitle">Themes verfügbar</div>
        </div>
      </div>
    </div>

    <div class="card card-yellow">
      <div class="card-top">
        <span class="card-icon">📦</span>
        <span class="card-arrow">→</span>
      </div>
      <div>
        <div class="card-title">Produkte</div>
        <div class="card-bottom">
          <div class="card-number">24</div>
          <div class="card-subtitle">Deine Produkte</div>
        </div>
      </div>
    </div>

    <div class="card card-pink">
      <div class="card-top">
        <span class="card-icon">🛒</span>
        <span class="card-arrow">→</span>
      </div>
      <div>
        <div class="card-title">Bestellungen</div>
        <div class="card-bottom">
          <div class="card-number">213</div>
          <div class="card-subtitle">Offene Orders</div>
        </div>
      </div>
    </div>

    <div class="card card-blue">
      <div class="card-top">
        <span class="card-icon">💳</span>
        <span class="card-arrow">→</span>
      </div>
      <div>
        <div class="card-title">Abrechnung</div>
        <div class="card-bottom">
          <div class="card-number">€4.2k</div>
          <div class="card-subtitle">Diesen Monat</div>
        </div>
      </div>
    </div>

    <div class="card card-orange">
      <div class="card-top">
        <span class="card-icon">🚚</span>
        <span class="card-arrow">→</span>
      </div>
      <div>
        <div class="card-title">Versand</div>
        <div class="card-bottom">
          <div class="card-number">12</div>
          <div class="card-subtitle">In Zustellung</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">📊</span>
      <span>Dashboard</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">📂</span>
      <span>Kategorien</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">👤</span>
      <span>Profil</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span>Einstellungen</span>
    </div>
  </div>
</body>
</html>
