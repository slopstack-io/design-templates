<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1.0">
<title>Terminbuchung</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
body { font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen" style="max-width:430px; margin:0 auto;">

  <!-- Header -->
  <div class="bg-white px-5 pt-10 pb-4">
    <h1 class="text-xl font-bold">Terminbuchung</h1>
    <p class="text-sm text-gray-500 mt-1">Wähle Datum und Uhrzeit</p>
  </div>

  <!-- Month Calendar -->
  <div class="bg-white px-5 pb-4">
    <div class="flex items-center justify-between mb-4">
      <button class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100">
        <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <h2 class="text-sm font-semibold">Juni 2026</h2>
      <button class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100">
        <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>
    <div class="grid grid-cols-7 text-center text-xs text-gray-400 mb-2">
      <span>Mo</span><span>Di</span><span>Mi</span><span>Do</span><span>Fr</span><span>Sa</span><span>So</span>
    </div>
    <div class="grid grid-cols-7 text-center text-sm gap-y-1">
      <span class="py-2 text-gray-300">1</span>
      <span class="py-2">2</span>
      <span class="py-2">3</span>
      <span class="py-2">4</span>
      <span class="py-2">5</span>
      <span class="py-2">6</span>
      <span class="py-2 text-gray-400">7</span>
      <span class="py-2">8</span>
      <span class="py-2">9</span>
      <span class="py-2">10</span>
      <span class="py-2">11</span>
      <span class="py-2">12</span>
      <span class="py-2">13</span>
      <span class="py-2 text-gray-400">14</span>
      <span class="py-2">15</span>
      <span class="py-2">16</span>
      <span class="py-2">17</span>
      <span class="py-2 w-8 h-8 mx-auto bg-blue-600 text-white rounded-full flex items-center justify-center font-semibold">18</span>
      <span class="py-2">19</span>
      <span class="py-2">20</span>
      <span class="py-2 text-gray-400">21</span>
      <span class="py-2">22</span>
      <span class="py-2">23</span>
      <span class="py-2">24</span>
      <span class="py-2">25</span>
      <span class="py-2">26</span>
      <span class="py-2">27</span>
      <span class="py-2 text-gray-400">28</span>
      <span class="py-2">29</span>
      <span class="py-2">30</span>
    </div>
  </div>

  <div class="h-3"></div>

  <!-- Time Slots -->
  <div class="bg-white px-5 py-4">
    <h3 class="text-sm font-semibold mb-3">Verfügbare Zeiten — Do, 18. Juni</h3>
    <div class="flex flex-wrap gap-2">
      <button class="px-4 py-2.5 bg-blue-50 text-blue-700 text-sm font-medium rounded-full border border-blue-200">09:00</button>
      <button class="px-4 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-full">10:00</button>
      <button class="px-4 py-2.5 bg-blue-50 text-blue-700 text-sm font-medium rounded-full border border-blue-200">11:00</button>
      <button class="px-4 py-2.5 bg-blue-50 text-blue-700 text-sm font-medium rounded-full border border-blue-200">14:00</button>
      <button class="px-4 py-2.5 bg-gray-100 text-gray-400 text-sm rounded-full line-through">15:00</button>
      <button class="px-4 py-2.5 bg-blue-50 text-blue-700 text-sm font-medium rounded-full border border-blue-200">16:00</button>
      <button class="px-4 py-2.5 bg-blue-50 text-blue-700 text-sm font-medium rounded-full border border-blue-200">17:00</button>
    </div>
  </div>

  <div class="h-3"></div>

  <!-- Booking Card -->
  <div class="bg-white mx-5 rounded-2xl p-5 shadow-sm border border-gray-100">
    <h3 class="text-sm font-semibold mb-3">Buchungsdetails</h3>
    <div class="space-y-3">
      <div>
        <label class="block text-xs text-gray-500 mb-1">Name</label>
        <input type="text" placeholder="Ihr Name" class="w-full px-4 py-3 bg-gray-50 rounded-xl text-sm border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Anmerkungen</label>
        <textarea rows="2" placeholder="Besondere Wünsche..." class="w-full px-4 py-3 bg-gray-50 rounded-xl text-sm border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
      </div>
      <button class="w-full py-3.5 bg-blue-600 text-white text-sm font-semibold rounded-xl">Termin buchen</button>
    </div>
  </div>

  <div class="h-20"></div>

  <!-- Bottom Nav -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100" style="max-width:430px; margin:0 auto;">
    <div class="flex justify-around py-3">
      <button class="flex flex-col items-center gap-1 text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke-width="2"/></svg>
        <span class="text-[10px]">Kalender</span>
      </button>
      <button class="flex flex-col items-center gap-1 text-blue-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        <span class="text-[10px] font-medium">Buchen</span>
      </button>
      <button class="flex flex-col items-center gap-1 text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        <span class="text-[10px]">Nachrichten</span>
      </button>
      <button class="flex flex-col items-center gap-1 text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span class="text-[10px]">Profil</span>
      </button>
    </div>
  </div>
</body>
</html>
