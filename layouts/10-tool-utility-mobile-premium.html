<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1.0">
<title>Tool Premium Mobile</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; background: #0A0A0A; }
.font-mono { font-family: 'JetBrains Mono', monospace; }
.glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
</style>
</head>
<body class="max-w-[430px] mx-auto min-h-screen text-white">

<!-- Header -->
<header class="px-8 pt-8 pb-6">
  <h1 class="text-lg font-light tracking-wide text-white/70">Werkzeuge</h1>
</header>

<!-- Code Card -->
<section class="px-8 py-4">
  <div class="glass rounded-2xl p-6">
    <div class="flex items-center gap-3 mb-5">
      <div class="w-1.5 h-1.5 rounded-full bg-red-400/60"></div>
      <div class="w-1.5 h-1.5 rounded-full bg-yellow-400/60"></div>
      <div class="w-1.5 h-1.5 rounded-full bg-green-400/60"></div>
      <span class="text-[9px] text-white/20 ml-2 font-mono">config.yaml</span>
    </div>
    <pre class="font-mono text-xs leading-7"><span class="text-[#D4AF37]/30"> 1</span>  <span class="text-purple-400/60">server</span><span class="text-white/10">:</span>
<span class="text-[#D4AF37]/30"> 2</span>    <span class="text-blue-400/60">host</span><span class="text-white/10">:</span> <span class="text-green-400/50">"0.0.0.0"</span>
<span class="text-[#D4AF37]/30"> 3</span>    <span class="text-blue-400/60">port</span><span class="text-white/10">:</span> <span class="text-orange-400/50">8080</span>
<span class="text-[#D4AF37]/30"> 4</span>    <span class="text-blue-400/60">debug</span><span class="text-white/10">:</span> <span class="text-red-400/50">true</span>
<span class="text-[#D4AF37]/30"> 5</span>
<span class="text-[#D4AF37]/30"> 6</span>  <span class="text-purple-400/60">database</span><span class="text-white/10">:</span>
<span class="text-[#D4AF37]/30"> 7</span>    <span class="text-blue-400/60">driver</span><span class="text-white/10">:</span> <span class="text-green-400/50">"postgresql"</span>
<span class="text-[#D4AF37]/30"> 8</span>    <span class="text-blue-400/60">pool_size</span><span class="text-white/10">:</span> <span class="text-orange-400/50">10</span></pre>
  </div>
</section>

<!-- Toggles -->
<section class="px-8 py-6">
  <div class="space-y-6">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-sm font-light text-white/50">API-Zugang</p>
      </div>
      <div class="w-9 h-5 bg-[#D4AF37]/20 rounded-full relative">
        <div class="w-3.5 h-3.5 bg-[#D4AF37] rounded-full absolute right-0.5 top-[3px]"></div>
      </div>
    </div>
    <div class="flex items-center justify-between">
      <div>
        <p class="text-sm font-light text-white/50">Authentifizierung</p>
      </div>
      <div class="w-9 h-5 bg-[#D4AF37]/20 rounded-full relative">
        <div class="w-3.5 h-3.5 bg-[#D4AF37] rounded-full absolute right-0.5 top-[3px]"></div>
      </div>
    </div>
    <div class="flex items-center justify-between">
      <div>
        <p class="text-sm font-light text-white/30">Protokollierung</p>
      </div>
      <div class="w-9 h-5 bg-white/5 rounded-full relative">
        <div class="w-3.5 h-3.5 bg-white/20 rounded-full absolute left-0.5 top-[3px]"></div>
      </div>
    </div>
    <div class="flex items-center justify-between">
      <div>
        <p class="text-sm font-light text-white/50">Cache</p>
      </div>
      <div class="w-9 h-5 bg-[#D4AF37]/20 rounded-full relative">
        <div class="w-3.5 h-3.5 bg-[#D4AF37] rounded-full absolute right-0.5 top-[3px]"></div>
      </div>
    </div>
  </div>
</section>

<!-- Status Dots Only -->
<section class="px-8 py-8">
  <div class="space-y-5">
    <div class="flex items-center justify-between">
      <span class="text-xs font-light text-white/25">Server</span>
      <div class="w-2 h-2 rounded-full bg-green-500/60"></div>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-xs font-light text-white/25">Datenbank</span>
      <div class="w-2 h-2 rounded-full bg-green-500/60"></div>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-xs font-light text-white/25">Speicher</span>
      <div class="w-2 h-2 rounded-full bg-yellow-500/60"></div>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-xs font-light text-white/25">CDN</span>
      <div class="w-2 h-2 rounded-full bg-green-500/60"></div>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-xs font-light text-white/25">Scheduler</span>
      <div class="w-2 h-2 rounded-full bg-green-500/60"></div>
    </div>
  </div>
</section>

<div class="h-24"></div>
</body>
</html>
