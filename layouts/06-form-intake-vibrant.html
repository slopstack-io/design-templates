<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formular / Intake / Survey — 🎨 Vibrant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #f8fafc; --bg-card: #ffffff; --text: #0f172a; --text-secondary: #64748b; --accent: #6366f1; --accent-soft: rgba(99,102,241,0.08); --border: #e2e8f0; --success: #22c55e; }
    * { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .form-container { background: var(--bg-card); border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); max-width: 560px; width: 100%; padding: 48px; }
    .progress-bar { background: var(--border); border-radius: 9999px; height: 6px; margin-bottom: 32px; }
    .progress-fill { background: var(--accent); border-radius: 9999px; height: 100%; transition: width 0.3s; }
    .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 32px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
    .step-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }
    .step-dot.done { background: var(--success); }
    .input-group { margin-bottom: 24px; }
    .input-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
    .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; font-family: inherit; }
    .input-group input:focus, .input-group textarea:focus, .input-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .input-group textarea { resize: vertical; min-height: 100px; }
    .radio-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .radio-card { flex: 1; min-width: 120px; padding: 16px; border: 1px solid var(--border); border-radius: 12px; cursor: pointer; text-align: center; transition: all 0.15s; }
    .radio-card:hover { border-color: var(--accent); }
    .radio-card.selected { border-color: var(--accent); background: var(--accent-soft); }
    .radio-card .icon { font-size: 28px; margin-bottom: 8px; }
    .radio-card .label { font-size: 13px; font-weight: 500; }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 28px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .helper-text { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  
    @keyframes gradient-shift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    body { background: linear-gradient(135deg, #f5f3ff, #ede9fe, #fce7f3, #fef3c7) !important; background-size: 400% 400% !important; animation: gradient-shift 15s ease infinite; }
    .card, .recipe-card, .subject-card, .control-card, .restaurant-card,
    .doctor-card, .appointment-card, .message-preview, .place-card {
        background: rgba(255,255,255,0.85) !important; backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.5) !important;
        box-shadow: 0 8px 32px rgba(99,102,241,0.1) !important;
    }
    .nav, nav { background: rgba(255,255,255,0.7) !important; backdrop-filter: blur(16px) !important; }
    h1, h2, h3 { background: linear-gradient(135deg, #6366f1, #ec4899, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-primary, .btn-book { background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899) !important; }
    .bottom-nav { background: rgba(255,255,255,0.7) !important; backdrop-filter: blur(16px) !important; }
    
</style>
</head>
<body>
  <div class="form-container">
    <!-- Progress -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <span style="font-size: 13px; color: var(--text-secondary);">Schritt 3 von 5</span>
      <span style="font-size: 13px; color: var(--accent); font-weight: 500;">60%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width: 60%;"></div></div>
    <div class="step-indicator">
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>

    <!-- Question -->
    <h2 style="font-size: 24px; font-weight: 700; margin: 0 0 8px; line-height: 1.3;">Was für eine App möchtest du erstellen?</h2>
    <p style="font-size: 15px; color: var(--text-secondary); margin: 0 0 32px; line-height: 1.5;">Wähle die Kategorie, die am besten zu deiner Idee passt.</p>

    <!-- Radio Cards -->
    <div class="radio-group" style="margin-bottom: 24px;">
      <div class="radio-card">
        <div class="icon">🛒</div>
        <div class="label">Online-Shop</div>
      </div>
      <div class="radio-card selected">
        <div class="icon">📊</div>
        <div class="label">Dashboard</div>
      </div>
      <div class="radio-card">
        <div class="icon">📱</div>
        <div class="label">Tool / App</div>
      </div>
    </div>
    <div class="radio-group" style="margin-bottom: 32px;">
      <div class="radio-card">
        <div class="icon">📝</div>
        <div class="label">Blog / CMS</div>
      </div>
      <div class="radio-card">
        <div class="icon">📅</div>
        <div class="label">Buchungssystem</div>
      </div>
      <div class="radio-card">
        <div class="icon">💬</div>
        <div class="label">Community</div>
      </div>
    </div>

    <!-- Text Input -->
    <div class="input-group">
      <label>Beschreibe deine Idee in ein paar Sätzen</label>
      <textarea placeholder="z.B. Ich brauche ein Dashboard für mein kleines Café, das mir Tageseinnahmen, beliebte Produkte und Mitarbeiter-Schichten anzeigt..."></textarea>
      <p class="helper-text">Je mehr Details, desto besser können wir dir helfen.</p>
    </div>

    <!-- Select -->
    <div class="input-group">
      <label>Wie schnell brauchst du die App?</label>
      <select>
        <option>Sofort (1-2 Tage)</option>
        <option>Diese Woche</option>
        <option selected>Innerhalb von 2 Wochen</option>
        <option>Kein Druck, Qualität zählt</option>
      </select>
    </div>

    <!-- Navigation -->
    <div style="display: flex; justify-content: space-between; margin-top: 32px;">
      <button class="btn btn-ghost">← Zurück</button>
      <button class="btn btn-primary">Weiter →</button>
    </div>
  </div>
</body>
</html>
