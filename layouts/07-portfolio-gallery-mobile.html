<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1.0">
<title>Portfolio Galerie</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
body { font-family: 'Inter', sans-serif; }
.masonry { columns: 2; column-gap: 12px; }
.masonry > div { break-inside: avoid; margin-bottom: 12px; }
</style>
</head>
<body class="bg-white text-gray-900 min-h-screen" style="max-width:430px; margin:0 auto;">

  <!-- Status Bar -->
  <div class="flex justify-between items-center px-6 pt-3 pb-2 text-xs text-gray-500">
    <span>21:47</span>
    <div class="flex gap-1">
      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><rect x="1" y="6" width="18" height="12" rx="2"/><rect x="20" y="9" width="2" height="6" rx="1"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="px-5 pt-4 pb-3">
    <div class="flex items-center justify-between">
      <h1 class="text-xl font-bold">Portfolio</h1>
      <button class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100">
        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      </button>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="px-5 pb-4 flex items-center gap-6">
    <div class="flex items-center gap-1.5 text-sm text-gray-500">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21" stroke-width="2"/></svg>
      <span class="font-medium">248</span> <span class="text-gray-400">Fotos</span>
    </div>
    <div class="flex items-center gap-1.5 text-sm text-gray-500">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
      <span class="font-medium">3.2K</span> <span class="text-gray-400">Likes</span>
    </div>
  </div>

  <!-- Filter Chips -->
  <div class="px-5 pb-4 flex gap-2 overflow-x-auto scrollbar-hide">
    <button class="px-4 py-2 bg-gray-900 text-white text-sm font-medium rounded-full whitespace-nowrap">Alle</button>
    <button class="px-4 py-2 bg-gray-100 text-gray-600 text-sm font-medium rounded-full whitespace-nowrap">Architektur</button>
    <button class="px-4 py-2 bg-gray-100 text-gray-600 text-sm font-medium rounded-full whitespace-nowrap">Natur</button>
    <button class="px-4 py-2 bg-gray-100 text-gray-600 text-sm font-medium rounded-full whitespace-nowrap">Porträt</button>
    <button class="px-4 py-2 bg-gray-100 text-gray-600 text-sm font-medium rounded-full whitespace-nowrap">Stadt</button>
  </div>

  <!-- Masonry Grid -->
  <div class="px-5 masonry">
    <div class="rounded-xl overflow-hidden bg-gray-100">
      <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=500&fit=crop" class="w-full" alt="">
      <div class="p-3">
        <p class="text-sm font-medium">Alpenpanorama</p>
        <p class="text-xs text-gray-400">128 ♥</p>
      </div>
    </div>
    <div class="rounded-xl overflow-hidden bg-gray-100">
      <img src="https://images.unsplash.com/photo-1486325212027-8081e485255e?w=400&h=300&fit=crop" class="w-full" alt="">
      <div class="p-3">
        <p class="text-sm font-medium">Neonlicht</p>
        <p class="text-xs text-gray-400">94 ♥</p>
      </div>
    </div>
    <div class="rounded-xl overflow-hidden bg-gray-100">
      <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=400&h=400&fit=crop" class="w-full" alt="">
      <div class="p-3">
        <p class="text-sm font-medium">Bergnacht</p>
        <p class="text-xs text-gray-400">256 ♥</p>
      </div>
    </div>
    <div class="rounded-xl overflow-hidden bg-gray-100">
      <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&h=350&fit=crop" class="w-full" alt="">
      <div class="p-3">
        <p class="text-sm font-medium">Morgentau</p>
        <p class="text-xs text-gray-400">87 ♥</p>
      </div>
    </div>
    <div class="rounded-xl overflow-hidden bg-gray-100">
      <img src="https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=400&h=280&fit=crop" class="w-full" alt="">
      <div class="p-3">
        <p class="text-sm font-medium">Stadtansicht</p>
        <p class="text-xs text-gray-400">73 ♥</p>
      </div>
    </div>
    <div class="rounded-xl overflow-hidden bg-gray-100">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=400&h=450&fit=crop" class="w-full" alt="">
      <div class="p-3">
        <p class="text-sm font-medium">Sonnenuntergang</p>
        <p class="text-xs text-gray-400">195 ♥</p>
      </div>
    </div>
  </div>

  <div class="h-20"></div>

  <!-- Bottom Nav -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100" style="max-width:430px; margin:0 auto;">
    <div class="flex justify-around py-3">
      <button class="flex flex-col items-center gap-1 text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
        <span class="text-[10px]">Home</span>
      </button>
      <button class="flex flex-col items-center gap-1 text-gray-900">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        <span class="text-[10px] font-medium">Galerie</span>
      </button>
      <button class="flex flex-col items-center gap-1 text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <span class="text-[10px]">Suche</span>
      </button>
      <button class="flex flex-col items-center gap-1 text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span class="text-[10px]">Profil</span>
      </button>
    </div>
  </div>
</body>
</html>
