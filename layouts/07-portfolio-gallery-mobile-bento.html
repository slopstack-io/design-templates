<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1.0">
<title>Portfolio Bento</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
body { font-family: 'Inter', sans-serif; }
.masonry { columns: 2; column-gap: 10px; }
.masonry > div { break-inside: avoid; margin-bottom: 10px; }
</style>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bento: { pink: '#FF6B9D', blue: '#4ECDC4', orange: '#FF8A5C', purple: '#A78BFA', yellow: '#FBBF24', green: '#34D399', rose: '#FB7185', sky: '#38BDF8' }
      }
    }
  }
}
</script>
</head>
<body class="bg-white text-gray-900 min-h-screen" style="max-width:430px; margin:0 auto;">

  <!-- Header -->
  <div class="px-5 pt-10 pb-3">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-extrabold">Entdecke 🎨</h1>
      <button class="w-10 h-10 rounded-full bg-bento-purple/10 flex items-center justify-center">
        <svg class="w-5 h-5 text-bento-purple" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      </button>
    </div>
  </div>

  <!-- Emoji Stats -->
  <div class="px-5 pb-4 flex gap-3">
    <div class="flex items-center gap-1.5 px-3 py-2 bg-bento-pink/10 rounded-full">
      <span class="text-sm">📸</span>
      <span class="text-sm font-bold text-bento-pink">248</span>
    </div>
    <div class="flex items-center gap-1.5 px-3 py-2 bg-bento-purple/10 rounded-full">
      <span class="text-sm">❤️</span>
      <span class="text-sm font-bold text-bento-purple">3.2K</span>
    </div>
    <div class="flex items-center gap-1.5 px-3 py-2 bg-bento-blue/10 rounded-full">
      <span class="text-sm">⭐</span>
      <span class="text-sm font-bold text-bento-blue">89</span>
    </div>
  </div>

  <!-- Colorful Filter Pills -->
  <div class="px-5 pb-4 flex gap-2 overflow-x-auto">
    <button class="px-4 py-2 bg-gradient-to-r from-bento-pink to-bento-purple text-white text-sm font-semibold rounded-full whitespace-nowrap">Alle ✨</button>
    <button class="px-4 py-2 bg-bento-blue/10 text-bento-blue text-sm font-semibold rounded-full whitespace-nowrap">Architektur 🏛</button>
    <button class="px-4 py-2 bg-bento-green/10 text-bento-green text-sm font-semibold rounded-full whitespace-nowrap">Natur 🌿</button>
    <button class="px-4 py-2 bg-bento-orange/10 text-bento-orange text-sm font-semibold rounded-full whitespace-nowrap">Porträt 👤</button>
  </div>

  <!-- Bento Grid -->
  <div class="px-5">
    <!-- Row: Large + Small -->
    <div class="flex gap-2.5 mb-2.5">
      <div class="flex-1 rounded-2xl overflow-hidden relative group" style="aspect-ratio:1/1.2">
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=480&fit=crop" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-bento-pink/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-3">
          <p class="text-white text-sm font-bold">Alpenpanorama</p>
        </div>
        <div class="absolute top-2 right-2 bg-white/90 backdrop-blur-sm px-2 py-1 rounded-full text-[10px] font-bold text-bento-pink">♥ 128</div>
      </div>
      <div class="flex flex-col gap-2.5" style="width:45%">
        <div class="rounded-2xl overflow-hidden relative group flex-1">
          <img src="https://images.unsplash.com/photo-1486325212027-8081e485255e?w=200&h=200&fit=crop" class="w-full h-full object-cover">
          <div class="absolute inset-0 bg-gradient-to-t from-bento-blue/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-3">
            <p class="text-white text-xs font-bold">Neonlicht</p>
          </div>
        </div>
        <div class="rounded-2xl overflow-hidden relative group flex-1">
          <img src="https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=200&h=200&fit=crop" class="w-full h-full object-cover">
          <div class="absolute inset-0 bg-gradient-to-t from-bento-orange/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-3">
            <p class="text-white text-xs font-bold">Stadt</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Row: Three equal -->
    <div class="flex gap-2.5 mb-2.5">
      <div class="flex-1 rounded-2xl overflow-hidden relative group">
        <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=200&h=250&fit=crop" class="w-full object-cover" style="height:160px">
        <div class="absolute inset-0 bg-gradient-to-t from-bento-purple/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-2">
          <p class="text-white text-[11px] font-bold">Bergnacht</p>
        </div>
      </div>
      <div class="flex-1 rounded-2xl overflow-hidden relative group">
        <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=200&h=250&fit=crop" class="w-full object-cover" style="height:160px">
        <div class="absolute inset-0 bg-gradient-to-t from-bento-green/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-2">
          <p class="text-white text-[11px] font-bold">Morgentau</p>
        </div>
      </div>
      <div class="flex-1 rounded-2xl overflow-hidden relative group">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=200&h=250&fit=crop" class="w-full object-cover" style="height:160px">
        <div class="absolute inset-0 bg-gradient-to-t from-bento-yellow/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-2">
          <p class="text-white text-[11px] font-bold">Dämmerung</p>
        </div>
      </div>
    </div>

    <!-- Row: Wide card -->
    <div class="rounded-2xl overflow-hidden relative group mb-2.5">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=430&h=200&fit=crop" class="w-full object-cover" style="height:140px">
      <div class="absolute inset-0 bg-gradient-to-t from-bento-rose/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
        <div>
          <p class="text-white text-sm font-bold">Landschaftspanorama</p>
          <p class="text-white/80 text-xs">256 ♥ · Ausgewählt</p>
        </div>
      </div>
    </div>
  </div>

  <div class="h-8"></div>
</body>
</html>
