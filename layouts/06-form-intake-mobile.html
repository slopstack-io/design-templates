<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1.0">
<title>Formular Basis</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
body { font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="bg-white text-gray-900 min-h-screen" style="max-width:430px; margin:0 auto;">

  <!-- Progress Bar -->
  <div class="bg-gray-100 h-1.5 w-full">
    <div class="bg-blue-600 h-1.5 rounded-r-full" style="width:50%"></div>
  </div>

  <!-- Status Bar -->
  <div class="flex justify-between items-center px-6 pt-3 pb-1 text-xs text-gray-500">
    <span>21:47</span>
    <div class="flex gap-1.5">
      <div class="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
      <div class="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
      <div class="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
    </div>
  </div>

  <!-- Header -->
  <div class="px-6 py-4 flex items-center gap-3">
    <button class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100">
      <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <h1 class="text-lg font-semibold">Persönliche Daten</h1>
  </div>

  <!-- Form Content -->
  <div class="px-6 pb-6 space-y-5">

    <!-- Full Name -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Vollständiger Name</label>
      <input type="text" placeholder="Max Mustermann" class="w-full px-5 py-4 text-base bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
    </div>

    <!-- Email -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">E-Mail-Adresse</label>
      <input type="email" placeholder="max@beispiel.de" class="w-full px-5 py-4 text-base bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
    </div>

    <!-- Phone -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Telefonnummer</label>
      <input type="tel" placeholder="+49 170 1234567" class="w-full px-5 py-4 text-base bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
    </div>

    <!-- Gender Selection - Large Radio Buttons -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-3">Anrede</label>
      <div class="space-y-3">
        <label class="flex items-center gap-4 w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-xl cursor-pointer has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50">
          <input type="radio" name="gender" class="w-5 h-5 text-blue-600" checked>
          <span class="text-base">Herr</span>
        </label>
        <label class="flex items-center gap-4 w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-xl cursor-pointer has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50">
          <input type="radio" name="gender" class="w-5 h-5 text-blue-600">
          <span class="text-base">Frau</span>
        </label>
        <label class="flex items-center gap-4 w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-xl cursor-pointer has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50">
          <input type="radio" name="gender" class="w-5 h-5 text-blue-600">
          <span class="text-base">Divers</span>
        </label>
      </div>
    </div>

    <!-- Toggle -->
    <div class="flex items-center justify-between px-5 py-4 bg-gray-50 border border-gray-200 rounded-xl">
      <span class="text-base">Newsletter abonnieren</span>
      <button class="w-14 h-8 bg-blue-600 rounded-full relative transition-colors">
        <div class="w-6 h-6 bg-white rounded-full absolute top-1 right-1 shadow transition-all"></div>
      </button>
    </div>

    <!-- Text Area -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Nachricht (optional)</label>
      <textarea rows="3" placeholder="Ihre Nachricht..." class="w-full px-5 py-4 text-base bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"></textarea>
    </div>

    <!-- Submit -->
    <button class="w-full py-4 bg-blue-600 text-white text-base font-semibold rounded-xl hover:bg-blue-700 transition-colors">
      Weiter
    </button>

    <p class="text-center text-xs text-gray-400">Schritt 2 von 4</p>
  </div>

  <!-- Bottom Nav -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100" style="max-width:430px; margin:0 auto;">
    <div class="flex justify-around py-3">
      <button class="flex flex-col items-center gap-1 text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
        <span class="text-[10px]">Start</span>
      </button>
      <button class="flex flex-col items-center gap-1 text-blue-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <span class="text-[10px]">Formular</span>
      </button>
      <button class="flex flex-col items-center gap-1 text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span class="text-[10px]">Profil</span>
      </button>
    </div>
  </div>
</body>
</html>
